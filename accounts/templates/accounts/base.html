<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}SumitConnect{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0520;
      --surface: #1a0838;
      --border: #3a1a6a;
      --accent: #c080ff;
      --accent-dark: #a060df;
      --text: #f0e8ff;
      --muted: #8060a0;
      --danger: #ff4d4d;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0e0520 0%, #2a0a4e 50%, #1a0638 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
    }

    nav {
      background: rgba(20, 5, 50, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(180, 100, 255, 0.25);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-wrap: wrap;
      gap: 8px;
      box-shadow: 0 4px 24px rgba(120, 0, 255, 0.15);
    }

    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.5px;
      text-shadow: 0 0 20px rgba(192, 128, 255, 0.4);
    }

    .nav-links { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-links a:hover { color: var(--text); background: rgba(180, 100, 255, 0.15); }
    .nav-links a.active { color: #fff; background: rgba(150, 50, 255, 0.45); font-weight: 600; border: 1px solid rgba(180, 100, 255, 0.3); }

    .nav-links form { margin: 0; }
    .nav-links form button {
      color: var(--danger);
      background: none;
      border: 1px solid rgba(255, 77, 77, 0.2);
      font-size: 0.9rem;
      font-weight: 500;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .nav-links form button:hover { background: rgba(255, 77, 77, 0.1); }

    .page-wrapper { max-width: 1000px; margin: 0 auto; padding: 48px 24px; }

    .messages { list-style: none; margin-bottom: 24px; }
    .messages li { padding: 12px 18px; border-radius: var(--radius); font-size: 0.9rem; margin-bottom: 8px; font-weight: 500; }
    .messages .success { background: rgba(150, 50, 255, 0.15); color: var(--accent); border: 1px solid rgba(180, 100, 255, 0.3); }
    .messages .error { background: rgba(255, 77, 77, 0.1); color: #ff8080; border: 1px solid rgba(255, 77, 77, 0.25); }
    .messages .info { background: rgba(120, 50, 200, 0.15); color: #c8a0ff; border: 1px solid rgba(150, 80, 220, 0.3); }

    .card {
      background: rgba(30, 8, 60, 0.75);
      border: 1px solid rgba(180, 100, 255, 0.15);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 8px 32px rgba(80, 0, 160, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .page-title { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; color: var(--text); }
    .page-subtitle { color: var(--muted); margin-bottom: 32px; font-size: 0.95rem; }

    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 500; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group textarea {
      width: 100%;
      background: rgba(20, 5, 45, 0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: var(--muted); }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(192, 128, 255, 0.15);
    }
    .form-group textarea { resize: vertical; min-height: 100px; }

    .btn { display: inline-block; padding: 11px 24px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; cursor: pointer; border: none; text-decoration: none; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #9b30ff, #6a00d4); color: #fff; box-shadow: 0 4px 15px rgba(150, 50, 255, 0.35); }
    .btn-primary:hover { background: linear-gradient(135deg, #b040ff, #8000ff); box-shadow: 0 6px 22px rgba(180, 60, 255, 0.5); transform: translateY(-1px); }
    .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(180, 100, 255, 0.1); border-color: var(--accent); }
    .btn-danger { background: #c0392b; color: #fff; border: none; }
    .btn-danger:hover { background: #a93226; }

    .avatar { border-radius: 50%; object-fit: cover; border: 2px solid var(--border); }
    .avatar-lg { width: 100px; height: 100px; }
    .avatar-md { width: 56px; height: 56px; }
    .avatar-sm { width: 36px; height: 36px; }

    .avatar-placeholder {
      border-radius: 50%;
      background: rgba(150, 50, 255, 0.2);
      border: 2px solid rgba(180, 100, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }

    hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
    .text-muted { color: var(--muted); font-size: 0.9rem; }
    .text-accent { color: var(--accent); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(20, 5, 40, 0.6); }
    ::-webkit-scrollbar-thumb { background: rgba(150, 50, 255, 0.4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(180, 80, 255, 0.7); }

    @media (max-width: 600px) {
      nav { padding: 12px 16px; height: auto; }
      .nav-links a { padding: 6px 10px; font-size: 0.8rem; }
      .page-wrapper { padding: 28px 16px; }
      .page-title { font-size: 1.5rem; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="{% url 'home' %}" class="nav-brand">SumitConnect</a>
    <div class="nav-links">
      {% if user.is_authenticated %}
        <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a>
        <a href="{% url 'feed' %}" {% if request.resolver_match.url_name == 'feed' %}class="active"{% endif %}>Feed</a>
        <a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
        <a href="{% url 'profile' %}" {% if request.resolver_match.url_name == 'profile' %}class="active"{% endif %}>Profile</a>
        <a href="{% url 'users_list' %}" {% if request.resolver_match.url_name == 'users_list' %}class="active"{% endif %}>Users</a>
        <form method="POST" action="{% url 'logout' %}">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'login' %}" {% if request.resolver_match.url_name == 'login' %}class="active"{% endif %}>Login</a>
        <a href="{% url 'signup' %}" {% if request.resolver_match.url_name == 'signup' %}class="active"{% endif %}>Sign Up</a>
      {% endif %}
    </div>
  </nav>

  <div class="page-wrapper">
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </div>

</body>
</html>
