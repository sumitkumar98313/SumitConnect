{% extends 'accounts/base.html' %}
{% block title %}Sign Up — SumitConnect{% endblock %}

{% block content %}

<div style="max-width:400px; margin:0 auto;">

  <h1 class="page-title">Create Account</h1>
  <p class="page-subtitle">Join the SumitConnect community</p>

  <div class="card">
    <form method="POST" novalidate id="signupForm">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Letters, numbers, underscores only"
               value="{{ request.POST.username }}"
               autocomplete="username" required autofocus />
        <div style="font-size:0.78rem; color:#aaa; margin-top:5px;">
          Only letters, numbers and underscores. No spaces.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" name="password"
                 placeholder="Min. 6 characters"
                 autocomplete="new-password"
                 minlength="6" required style="padding-right:54px;" />
          <button type="button" id="togglePassword"
                  style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                         background:none; border:none; cursor:pointer; font-size:0.8rem;
                         color:#7C5CBF; padding:0; font-family:'Poppins',sans-serif; font-weight:500;">
            Show
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <div style="position:relative;">
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Repeat your password"
                 autocomplete="new-password"
                 required style="padding-right:54px;" />
          <button type="button" id="toggleConfirm"
                  style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                         background:none; border:none; cursor:pointer; font-size:0.8rem;
                         color:#7C5CBF; padding:0; font-family:'Poppins',sans-serif; font-weight:500;">
            Show
          </button>
        </div>
        <div id="matchMsg" style="font-size:0.8rem; margin-top:6px; display:none;"></div>
      </div>

      <button type="submit" id="submitBtn" class="btn btn-primary"
              style="width:100%; margin-top:6px; padding:11px; font-size:0.92rem;">
        Create Account
      </button>
    </form>
  </div>

  <p class="text-muted" style="text-align:center; margin-top:18px;">
    Already have an account? <a href="{% url 'login' %}">Login here</a>
  </p>

</div>

<script>
  var passwordInput = document.getElementById('password');
  var confirmInput = document.getElementById('confirm_password');
  var matchMsg = document.getElementById('matchMsg');

  function makeToggle(btnId, inputId) {
    var btn = document.getElementById(btnId);
    var input = document.getElementById(inputId);
    btn.addEventListener('click', function() {
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = 'Hide';
      } else {
        input.type = 'password';
        btn.textContent = 'Show';
      }
    });
  }

  makeToggle('togglePassword', 'password');
  makeToggle('toggleConfirm', 'confirm_password');

  function checkMatch() {
    if (confirmInput.value.length === 0) {
      matchMsg.style.display = 'none';
      return;
    }
    matchMsg.style.display = 'block';
    if (passwordInput.value === confirmInput.value) {
      matchMsg.textContent = 'Passwords match';
      matchMsg.style.color = '#2a5e0e';
    } else {
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = '#7a1f1f';
    }
  }

  passwordInput.addEventListener('input', checkMatch);
  confirmInput.addEventListener('input', checkMatch);

  document.getElementById('signupForm').addEventListener('submit', function(e) {
    if (passwordInput.value !== confirmInput.value) {
      e.preventDefault();
      matchMsg.style.display = 'block';
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = '#7a1f1f';
      confirmInput.focus();
    }
  });
</script>

{% endblock %}
