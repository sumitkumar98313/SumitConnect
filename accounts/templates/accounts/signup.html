{% extends 'accounts/base.html' %}
{% block title %}Sign Up — DevConnect{% endblock %}

{% block content %}

<div style="max-width:420px; margin:0 auto;">

  <h1 class="page-title">Create Account</h1>
  <p class="page-subtitle">Join the DevConnect community</p>

  <div class="card">
    <form method="POST">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Choose a username"
          required
          autofocus
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Min. 6 characters"
          required
        />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="Repeat your password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        style="width:100%; margin-top:12px; padding:14px; font-size:1rem;">
        Create New User
      </button>

    </form>
  </div>

  <p class="text-muted" style="text-align:center; margin-top:20px;">
    Already have an account?
    <a href="{% url 'login' %}"
       style="color:var(--accent); text-decoration:none; font-weight:500;">
      Login here
    </a>
  </p>

</div>

{% endblock %}
