{% extends 'accounts/base.html' %}
{% block title %}Change Password — SumitConnect{% endblock %}

{% block content %}

<div style="max-width:420px; margin:0 auto;">

  <!-- back link -->
  <a href="{% url 'profile' %}" class="text-muted">Back to Profile</a>

  <h1 class="page-title" style="margin-top:15px;">Change Password</h1>
  <p class="page-subtitle">Choose a strong new password</p>

  <div class="card">
    <form method="POST" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" placeholder="Enter current password" required />
      </div>

      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" placeholder="Min. 6 characters" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required />
        <!-- password match message shown here by JS -->
        <div id="matchMsg" style="font-size:0.85rem; margin-top:5px; display:none;"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;">Update Password</button>
    </form>
  </div>
</div>

<script>
  var newPass = document.getElementById('new_password');
  var confirmPass = document.getElementById('confirm_password');
  var matchMsg = document.getElementById('matchMsg');

  // check if passwords match while user is typing in confirm field
  confirmPass.addEventListener('input', function() {

    // if confirm field is empty, hide the message
    if (this.value.length === 0) {
      matchMsg.style.display = 'none';
      return;
    }

    // show message
    matchMsg.style.display = 'block';

    if (newPass.value === this.value) {
      matchMsg.textContent = 'Passwords match';
      matchMsg.style.color = 'green';
    } else {
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = 'red';
    }
  });

  // also check on form submit - stop submission if passwords don't match
  document.querySelector('form').addEventListener('submit', function(e) {
    if (newPass.value !== confirmPass.value) {
      e.preventDefault(); // stop form from submitting
      matchMsg.style.display = 'block';
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = 'red';
      confirmPass.focus(); // put cursor back in confirm field
    }
  });
</script>

{% endblock %}
