{% extends 'accounts/base.html' %}
{% block title %}Change Password — SumitConnect{% endblock %}

{% block content %}

<div style="max-width:400px; margin:0 auto;">

  <a href="{% url 'profile' %}" class="text-muted"
     style="display:inline-block; margin-bottom:20px; font-size:0.85rem;">
    &larr; Back to Profile
  </a>

  <h1 class="page-title">Change Password</h1>
  <p class="page-subtitle">Choose a strong new password</p>

  <div class="card">
    <form method="POST" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password"
               placeholder="Enter current password" required />
      </div>

      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password"
               placeholder="Min. 6 characters" required minlength="6" />
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password"
               placeholder="Repeat new password" required />
        <div id="matchMsg" style="font-size:0.8rem; margin-top:6px; display:none;"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; padding:11px;">
        Update Password
      </button>
    </form>
  </div>

</div>

<script>
  var newPass = document.getElementById('new_password');
  var confirmPass = document.getElementById('confirm_password');
  var matchMsg = document.getElementById('matchMsg');

  confirmPass.addEventListener('input', function() {
    if (this.value.length === 0) {
      matchMsg.style.display = 'none';
      return;
    }
    matchMsg.style.display = 'block';
    if (newPass.value === this.value) {
      matchMsg.textContent = 'Passwords match';
      matchMsg.style.color = '#2a5e0e';
    } else {
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = '#7a1f1f';
    }
  });

  document.querySelector('form').addEventListener('submit', function(e) {
    if (newPass.value !== confirmPass.value) {
      e.preventDefault();
      matchMsg.style.display = 'block';
      matchMsg.textContent = 'Passwords do not match';
      matchMsg.style.color = '#7a1f1f';
      confirmPass.focus();
    }
  });
</script>

{% endblock %}
