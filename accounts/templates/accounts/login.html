{% extends 'accounts/base.html' %}
{% block title %}Login — SumitConnect{% endblock %}

{% block content %}

<div style="max-width:400px; margin:0 auto;">

  <h1 class="page-title">Welcome back</h1>
  <p class="page-subtitle">Log in to your SumitConnect account</p>

  <div class="card">
    <form method="POST" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username"
               value="{{ request.POST.username }}"
               autocomplete="username" required autofocus />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" name="password"
                 placeholder="Enter your password"
                 autocomplete="current-password"
                 required style="padding-right:54px;" />
          <button type="button" id="togglePassword"
                  style="position:absolute; right:12px; top:50%; transform:translateY(-50%);
                         background:none; border:none; cursor:pointer; font-size:0.8rem;
                         color:#7C5CBF; padding:0; font-family:'Poppins',sans-serif; font-weight:500;">
            Show
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%; margin-top:6px; padding:11px; font-size:0.92rem;">
        Login
      </button>
    </form>
  </div>

  <p class="text-muted" style="text-align:center; margin-top:18px;">
    Don't have an account? <a href="{% url 'signup' %}">Sign up here</a>
  </p>

</div>

<script>
  var toggleBtn = document.getElementById('togglePassword');
  var passwordInput = document.getElementById('password');

  toggleBtn.addEventListener('click', function() {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      this.textContent = 'Hide';
    } else {
      passwordInput.type = 'password';
      this.textContent = 'Show';
    }
  });
</script>

{% endblock %}
