{% extends 'accounts/base.html' %}
{% block title %}Login — SumitConnect{% endblock %}

{% block content %}

<div style="max-width:420px; margin:0 auto;">

  <h1 class="page-title">Welcome back</h1>
  <p class="page-subtitle">Log in to your SumitConnect account</p>

  <div class="card">
    <form method="POST" novalidate>
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username"
               value="{{ request.POST.username }}" autocomplete="username" required autofocus />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <!-- password field with show/hide toggle button -->
        <div style="position:relative;">
          <input type="password" id="password" name="password" placeholder="Enter your password"
                 autocomplete="current-password" required style="padding-right:50px;" />
          <button type="button" id="togglePassword" aria-label="Toggle password visibility"
                  style="position:absolute; right:10px; top:8px;
                         background:none; border:none; cursor:pointer; font-size:0.8rem;
                         color:#6a1b9a; padding:0;">Show</button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Login</button>
    </form>
  </div>

  <!-- link to signup page -->
  <p class="text-muted" style="text-align:center; margin-top:20px;">
    Don't have an account?
    <a href="{% url 'signup' %}">Sign up here</a>
  </p>

</div>

<script>
  var toggleBtn = document.getElementById('togglePassword');
  var passwordInput = document.getElementById('password');

  // toggle between showing and hiding password
  toggleBtn.addEventListener('click', function() {
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      toggleBtn.textContent = 'Hide';
    } else {
      passwordInput.type = 'password';
      toggleBtn.textContent = 'Show';
    }
  });
</script>

{% endblock %}
