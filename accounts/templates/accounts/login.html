{% extends 'accounts/base.html' %}
{% block title %}Login — DevConnect{% endblock %}

{% block content %}

<div style="max-width:420px; margin:0 auto;">
  <h1 class="page-title">Welcome back</h1>
  <p class="page-subtitle">Log in to your DevConnect account</p>

  <div class="card">
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:8px;">Login →</button>
    </form>
  </div>

  <p class="text-muted" style="text-align:center; margin-top:20px;">
    Don't have an account?
    <a href="{% url 'signup' %}" style="color:var(--accent); text-decoration:none; font-weight:500;">Sign up here</a>
  </p>
</div>

{% endblock %}
